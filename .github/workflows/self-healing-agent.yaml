name: Self-Healing Deployment Agent

on:
  repository_dispatch:
    types: [heal-deployment]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository (e.g., org/repo)'
        required: true
        type: string
      source_ref:
        description: 'Source branch reference'
        required: true
        type: string
      error_log_artifact:
        description: 'Error log artifact name'
        required: true
        type: string
      terragrunt_path:
        description: 'Path to terragrunt configuration'
        required: true
        type: string
      environment:
        description: 'Environment (dev/test/prod)'
        required: true
        type: string
      workflow_to_trigger:
        description: 'Workflow filename to trigger'
        required: false
        type: string
        default: 'terragrunt-deployment.yaml'
      max_attempts:
        description: 'Maximum healing attempts'
        required: false
        type: number
        default: 10
      min_confidence:
        description: 'Minimum AI confidence threshold'
        required: false
        type: number
        default: 0.7
      run_id:
        description: 'Original workflow run ID'
        required: true
        type: string

jobs:
  heal-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    outputs:
      healing_successful: ${{ steps.healing_loop.outputs.healing_successful }}
      fix_branch_created: ${{ steps.healing_loop.outputs.fix_branch_created }}
      final_confidence: ${{ steps.healing_loop.outputs.final_confidence }}
      attempts_made: ${{ steps.healing_loop.outputs.attempts_made }}

    steps:
      - name: Checkout Self-Healing Pipeline
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r .github/scripts/requirements.txt

      - name: Extract Input Variables
        id: extract_inputs
        run: |
          if [ '${{ github.event_name }}' = 'repository_dispatch' ]; then
            echo "source_repo=${{ github.event.client_payload.source_repo }}" >> $GITHUB_OUTPUT
            echo "source_ref=${{ github.event.client_payload.source_ref }}" >> $GITHUB_OUTPUT
            echo "error_log_artifact=${{ github.event.client_payload.error_log_artifact }}" >> $GITHUB_OUTPUT
            echo "terragrunt_path=${{ github.event.client_payload.terragrunt_path }}" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.client_payload.environment }}" >> $GITHUB_OUTPUT
            echo "workflow_to_trigger=${{ github.event.client_payload.workflow_to_trigger || 'terragrunt-deployment.yaml' }}" >> $GITHUB_OUTPUT
            echo "max_attempts=${{ github.event.client_payload.max_attempts || 10 }}" >> $GITHUB_OUTPUT
            echo "min_confidence=${{ github.event.client_payload.min_confidence || 0.7 }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.event.client_payload.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "source_repo=${{ github.event.inputs.source_repo }}" >> $GITHUB_OUTPUT
            echo "source_ref=${{ github.event.inputs.source_ref }}" >> $GITHUB_OUTPUT
            echo "error_log_artifact=${{ github.event.inputs.error_log_artifact }}" >> $GITHUB_OUTPUT
            echo "terragrunt_path=${{ github.event.inputs.terragrunt_path }}" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "workflow_to_trigger=${{ github.event.inputs.workflow_to_trigger }}" >> $GITHUB_OUTPUT
            echo "max_attempts=${{ github.event.inputs.max_attempts }}" >> $GITHUB_OUTPUT
            echo "min_confidence=${{ github.event.inputs.min_confidence }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Self-Healing Loop
        id: healing_loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SOURCE_REPO: ${{ steps.extract_inputs.outputs.source_repo }}
          SOURCE_REF: ${{ steps.extract_inputs.outputs.source_ref }}
          ERROR_LOG_ARTIFACT: ${{ steps.extract_inputs.outputs.error_log_artifact }}
          TERRAGRUNT_PATH: ${{ steps.extract_inputs.outputs.terragrunt_path }}
          ENVIRONMENT: ${{ steps.extract_inputs.outputs.environment }}
          WORKFLOW_TO_TRIGGER: ${{ steps.extract_inputs.outputs.workflow_to_trigger }}
          MAX_ATTEMPTS: ${{ steps.extract_inputs.outputs.max_attempts }}
          MIN_CONFIDENCE: ${{ steps.extract_inputs.outputs.min_confidence }}
          RUN_ID: ${{ steps.extract_inputs.outputs.run_id }}
        run: |
          python .github/scripts/github-integration.py